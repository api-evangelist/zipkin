aid: zipkin
name: Zipkin
description: >-
  Zipkin is an open source distributed tracing system for gathering timing data
  to troubleshoot latency problems in microservice architectures. It was originally
  developed at Twitter based on the Google Dapper paper, and is now a CNCF-related
  project maintained by the OpenZipkin community. Zipkin provides a collector,
  storage, and query service with a UI for visualizing trace data across distributed
  services.
type: Index
