apiVersion: naftiko/v1
kind: SharedCapability
metadata:
  name: zipkin-api-v2
  provider: zipkin
  api: zipkin-api-v2
info:
  title: Zipkin API V2 Shared Operations
  description: >-
    Shared per-API capability definition for the Zipkin v2 HTTP API.
    Exposes operations for ingesting spans and querying distributed traces,
    services, span names, and dependency links.
consumes:
  api: zipkin-api-v2
  openapi: openapi/zipkin-api-v2.yml
  operations:
    - operationId: getServices
      summary: Zipkin Get Service Names
      method: GET
      path: /api/v2/services
    - operationId: getSpanNames
      summary: Zipkin Get Span Names
      method: GET
      path: /api/v2/spans
    - operationId: reportSpans
      summary: Zipkin Report Spans
      method: POST
      path: /api/v2/spans
    - operationId: getTraces
      summary: Zipkin Search for Traces
      method: GET
      path: /api/v2/traces
    - operationId: getTrace
      summary: Zipkin Get a Trace by ID
      method: GET
      path: /api/v2/trace/{traceId}
    - operationId: getDependencies
      summary: Zipkin Get Dependency Links
      method: GET
      path: /api/v2/dependencies
    - operationId: getAutocompleteKeys
      summary: Zipkin Get Autocomplete Keys
      method: GET
      path: /api/v2/autocompleteKeys
    - operationId: getAutocompleteValues
      summary: Zipkin Get Autocomplete Values
      method: GET
      path: /api/v2/autocompleteValues
    - operationId: getHealth
      summary: Zipkin Health Check
      method: GET
      path: /health
